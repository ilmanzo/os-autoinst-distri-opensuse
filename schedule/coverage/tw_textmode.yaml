# schedule tests for coverage measurement ;
# when you add a test, you need to fill out the last
# section about coverage targets as well

# TODO figure out a better way to select the tuple : coverage targets, tests and packages


name:  measure test coverage for selected text mode utils
description: >
    Maintainer: amanzini
schedule:
  - autoyast/prepare_profile
  - installation/isosize
  - installation/bootloader_uefi
  - autoyast/installation
  - autoyast/console
  - autoyast/login
  - autoyast/autoyast_reboot
  - installation/grub_test
  - installation/first_boot
  - console/system_prepare
  - coverage/coverage_setup
  - network/snmp
#  - console/dig
  - console/cpio
  - console/curl_https
  - console/curl_ipv6
  - console/gd
  - console/lshw
  - console/nano
  - console/nftables
#  - console/tracepath
  - console/traceroute
#  - console/nginx
#  - console/pciutils
#  - console/sysctl
  - console/tar
  - console/unzip
  - console/vim
  - console/wavpack
  - coverage/coverage_report
test_data:
  # packages needed to make tests work, but NOT instrumented
  helper_packages:
    - gzip       # used by tar test
    - iputils    # for ping
    - systemd    # for systemd-run (run0 test)
    - wget       # to download test data
  # syntax: package -> binary (or list of binaries) to instrument
  coverage_targets:
    bind-utils: /usr/bin/dig
    bzip2: /usr/bin/bzip2
    cpio: /usr/bin/cpio
    curl: /usr/bin/curl
    gd:
      - /usr/bin/giftogd2
      - /usr/bin/gd2togif
    lshw: /usr/sbin/lshw
    net-snmp:
      - /usr/bin/snmpget
      - /usr/bin/snmpset
      - /usr/bin/snmpusm
    nftables: /usr/sbin/nft
    nano: /usr/bin/nano
    procps:
      - /usr/bin/vmstat
      - /sbin/sysctl
    tar: /usr/bin/tar
    unzip: /usr/bin/unzip
    vim: /usr/bin/vim-nox11
    wavpack:
      - /usr/bin/wavpack
      - /usr/bin/wvunpack
#    nginx: /sbin/nginx
    traceroute: /usr/sbin/traceroute
